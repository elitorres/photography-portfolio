<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video | Urban Landscapes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-meta {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .video-meta p {
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">Urban Landscapes</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="video.html">Video</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="page">
    <section class="section">
      <div class="section-header">
        <h2>Film</h2>
        <div class="section-line"></div>
      </div>

      <div class="video-wrap">
        <iframe
          src="https://www.youtube.com/embed/s-_n4-kS9l0?rel=0&modestbranding=1"
          title="Urban Landscapes — Film"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>

      <div class="video-meta">
        <p>Urban Landscapes &nbsp;·&nbsp; City Through My Lens</p>
      </div>
    </section>
  </main>

  <footer>
    <span>Urban Landscapes Photography</span>
    <span>© 2026</span>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>
